name: opensearch-dashboards
base: ubuntu@24.04 # the base environment for this rock
license: Apache-2.0

version: '2.19.2' # just for humans. Semantic versioning is recommended

summary: 'OpenSearch Dashboards: community-driven OpenSearch visualization suite.'
description: |
    OpenSearch Dashboard is a community-driven, Apache 2.0-licensed open source
    user interface that lets you visualize your OpenSearch data and run and scale
    your OpenSearch clusters.

platforms: # the platforms this rock should be built on and run on
    amd64:

services:
  opensearch-dashboards:
    override: replace
    startup: enabled
    summary: Start Opensearch Dashboards
    command: '/bin/bash /bin/start.sh'
    environment:
      OPS_ROOT: /opt/opensearch-dashboards
      OPENSEARCH_DASHBOARDS_HOME: /usr/share/opensearch-dashboards
      OPENSEARCH_DASHBOARDS_BIN: /usr/share/opensearch-dashboards/bin
      OPENSEARCH_DASHBOARDS_PATH_CONF: /etc/opensearch-dashboards
      OPENSEARCH_DASHBOARDS_VARLOG: /var/log/opensearch-dashboards
      OPENSEARCH_DASHBOARDS_VARLIB: /var/lib/opensearch-dashboards
      OPENSEARCH_DASHBOARDS_TMPDIR: /var/tmp/opensearch-dashboards
      NODE_HOME: /usr/share/opensearch-dashboards/node

parts:
    opensearch-dashboards-snap:
      plugin: nil
      stage-snaps:
        - opensearch-dashboards/2/edge/test-lp-snap
      stage:
        - "-opt/opensearch-dashboards/helpers"
        - "-opt/opensearch-dashboards/start.sh"
      stage-packages:
        - util-linux
        - curl

    non-root-user:
      plugin: nil
      after: [opensearch-dashboards-snap]
      overlay-script: |
        groupadd -R $CRAFT_OVERLAY -g 584792 opensearch_dashboards
        useradd -R $CRAFT_OVERLAY -M -r -g opensearch_dashboards -u 584792 opensearch_dashboards
      override-prime: |
        craftctl default

        DASHBOARDS_VARLIB="${CRAFT_PRIME}/var/lib/opensearch-dashboards"
        DASHBOARDS_VARLOG="$CRAFT_PRIME/var/log/opensearch-dashboards"
        DASHBOARDS_TMPDIR="$CRAFT_PRIME/usr/share/tmp"
        DASHBOARDS_HOME="${CRAFT_PRIME}/usr/share/opensearch-dashboards" 

        mkdir -p "${DASHBOARDS_VARLIB}" "${DASHBOARDS_VARLOG}" "${DASHBOARDS_TMPDIR}"
        chown -R 584792:root "${DASHBOARDS_VARLIB}" "${DASHBOARDS_VARLOG}" "${DASHBOARDS_TMPDIR}" \
        
        chmod -R 770 "${DASHBOARDS_VARLIB}" "${DASHBOARDS_VARLOG}" "${DASHBOARDS_TMPDIR}"
        chmod -R 755 "${DASHBOARDS_HOME}/bin"

    entry:
      plugin: dump
      source: scripts
      organize:
        start.sh: usr/bin/start.sh
        set-conf.sh: usr/bin/set-conf.sh
      stage:
        - usr/bin/start.sh
        - usr/bin/set-conf.sh
